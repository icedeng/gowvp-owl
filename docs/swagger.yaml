  /channels/{id}/history/control:
    post:
      consumes:
      - application/json
      description: |-
        对历史回放/下载会话执行暂停、恢复、倍速、跳转等控制。
        `action` 枚举：`play` 恢复播放、`pause` 暂停、`speed` 调整倍速、`seek` 跳转到指定时间。
        调用前置条件：历史会话已经启动。
        失败场景：1. 会话不存在；2. action 不受支持；3. 跳转时间越界；4. 设备未返回控制应答。
        暂停示例：`{ "mode":"playback", "action":"pause" }`
        倍速示例：`{ "mode":"playback", "action":"speed", "scale":2 }`
        跳转示例：`{ "mode":"playback", "action":"seek", "seek_at":1710867600 }`
        成功响应示例：`{ "msg": "ok" }`
      parameters:
      - description: 通道ID
        in: path
        name: id
        required: true
        type: string
      - description: 历史控制参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.historyControlInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: 控制历史会话
      tags:
      - Channel
  /channels/{id}/history/start:
    post:
      consumes:
      - application/json
      description: |-
        启动历史回放或历史下载会话。
        `mode` 可选：`playback` 表示回放，`download` 表示下载。
        调用前置条件：1. 通道必须存在；2. 设备在线；3. 目标时间段内存在可用录像；4. 设备支持历史回放或下载。
        失败场景：1. 通道不存在；2. 设备离线；3. 无录像可回放；4. 设备返回协议不支持；5. 会话建立超时。
        请求示例：`{ "mode": "playback", "start_at": 1710864000, "end_at": 1710950400 }`
        成功响应示例：`{ "msg": "ok" }`
      parameters:
      - description: 通道ID
        in: path
        name: id
        required: true
        type: string
      - description: 历史会话参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.historyControlInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: 启动历史会话
      tags:
      - Channel
  /channels/{id}/history/stop:
    post:
      consumes:
      - application/json
      description: |-
        停止已创建的历史回放或历史下载会话。
        调用前置条件：历史会话已经启动。
        失败场景：1. 会话不存在；2. 设备已离线；3. 设备拒绝停止命令。
        请求示例：`{ "mode": "playback" }`
      parameters:
