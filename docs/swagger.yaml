          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: 下载录像文件
      tags:
      - Recording
  /recordings/channels/{cid}/index.m3u8:
    get:
      description: |-
        根据通道 ID 和时间范围动态生成 HLS m3u8 播放列表，便于浏览器直接回放录像。
        请求示例：`/recordings/channels/GB_34020000001320000001/index.m3u8?start_ms=1710864000000&end_ms=1710950400000&token=xxx`
        返回内容为标准 m3u8 文本，不是 JSON。
        调用前置条件：指定时间范围内存在录像文件，且录像文件仍在磁盘中。
        失败场景：1. `cid` 缺失；2. `start_ms/end_ms` 缺失；3. 范围内无录像；4. 录像文件已被清理。
      parameters:
      - description: 通道ID
        in: path
        name: cid
        required: true
        type: string
      - description: 开始毫秒时间戳
        in: query
        name: start_ms
        required: true
        type: integer
      - description: 结束毫秒时间戳
        in: query
        name: end_ms
        required: true
        type: integer
      - description: 访问令牌
        in: query
        name: token
        type: string
      produces:
      - application/vnd.apple.mpegurl
      responses:
        "200":
          description: M3U8 内容
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: 生成录像 HLS 播放列表
      tags:
      - Recording
  /recordings/monthly:
    get:
      description: |-
        返回指定月份每天是否存在录像的位图字符串，适合月历视图快速渲染。
        请求示例：`/recordings/monthly?cid=GB_34020000001320000001&year=2024&month=3`
        响应示例：`{ "year": 2024, "month": 3, "days": 31, "has_video": "1110010000000000000000000000000" }`
        调用前置条件：已存在录像数据。
        失败场景：1. 年月参数非法；2. 查询失败。
      parameters:
      - description: 通道ID
        in: query
        name: cid
        type: string
      - description: 年份
        in: query
        name: year
        required: true
        type: integer
      - description: 月份
        in: query
        name: month
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/recording.MonthlyStatsOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取月度录像统计
      tags:
      - Recording
  /recordings/timeline:
    get:
      description: |-
        返回某个通道在指定时间范围内的录像时间轴片段，适合前端时间轴控件直接使用。
        请求示例：`/recordings/timeline?cid=GB_34020000001320000001&start_ms=1710864000000&end_ms=1710950400000`
        响应示例：`{ "items": [ { "id": 1, "start_ms": 1710864000000, "end_ms": 1710867600000, "duration": 3600 } ] }`
        调用前置条件：指定通道已有录像记录。
        失败场景：1. `cid` 缺失；2. 时间范围非法；3. 查询失败。
      parameters:
      - description: 通道ID
        in: query
        name: cid
        required: true
        type: string
      - description: 开始毫秒时间戳
        in: query
        name: start_ms
        type: integer
      - description: 结束毫秒时间戳
        in: query
        name: end_ms
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerTimelineResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取录像时间轴
      tags:
      - Recording
