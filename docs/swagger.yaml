        required: true
        type: string
      - description: GB 查询参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.SwaggerGBDeviceQueryInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwaggerGBDeviceQueryOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: GB 设备查询
      tags:
      - GB28181
