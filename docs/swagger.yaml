basePath: /
definitions:
  api.AIBoundingBox:
    properties:
      x_max:
        example: 360
        type: integer
      x_min:
        example: 120
        type: integer
      y_max:
        example: 500
        type: integer
      y_min:
        example: 80
        type: integer
    type: object
  api.AIDetection:
    properties:
      area:
        description: 边界框像素面积
        example: 35800
        type: integer
      box:
        allOf:
        - $ref: '#/definitions/api.AIBoundingBox'
        description: 像素坐标边界框
      confidence:
        description: 置信度（0.0-1.0）
        example: 0.92
        type: number
      label:
        description: 物体类别
        example: person
        type: string
      norm_box:
        allOf:
        - $ref: '#/definitions/api.AINormBox'
        description: 归一化边界框
    type: object
  api.AIDetectionInput:
    properties:
      camera_id:
        description: 摄像头 ID
        example: GB_34020000001320000001
        type: string
      detections:
        description: 检测结果列表
        items:
          $ref: '#/definitions/api.AIDetection'
        type: array
      snapshot:
        description: Base64 编码的快照（JPEG）
        type: string
      snapshot_height:
        description: 快照高度
        example: 1080
        type: integer
      snapshot_width:
        description: 快照宽度
        example: 1920
        type: integer
      timestamp:
        description: Unix 时间戳 (毫秒)
        type: string
    type: object
  api.AIGlobalStats:
    properties:
      active_streams:
        description: 活跃流数量
        example: 8
        type: integer
      total_detections:
        description: 总检测次数
        example: 1234
        type: integer
      uptime_seconds:
        description: 运行时间（秒）
        example: 3600
        type: integer
    type: object
  api.AIKeepaliveInput:
    properties:
      message:
        description: 附加消息
        example: alive
        type: string
      stats:
        allOf:
        - $ref: '#/definitions/api.AIGlobalStats'
        description: 全局统计信息
      timestamp:
        description: Unix 时间戳（毫秒）
        example: 1710931200000
        type: integer
    type: object
  api.AINormBox:
    properties:
      h:
        description: 高度
        example: 0.32
        type: number
      w:
        description: 宽度
        example: 0.18
        type: number
      x:
        description: 中心点 X 坐标
        example: 0.42
        type: number
      "y":
        description: 中心点 Y 坐标
        example: 0.51
        type: number
    type: object
  api.AIStartedInput:
    properties:
      message:
        description: 启动消息
        example: service started
        type: string
      timestamp:
        description: Unix 时间戳（毫秒）
        example: 1710931200000
        type: integer
    type: object
  api.AIStoppedInput:
    properties:
      camera_id:
        description: 摄像头 ID
        example: GB_34020000001320000001
        type: string
      message:
        description: 详细信息
        example: manual stop
        type: string
      reason:
        description: 停止原因（user_requested/error）
        example: user_requested
        type: string
      timestamp:
        description: Unix 时间戳 (毫秒)
        type: string
    type: object
  api.AIWebhookOutput:
    properties:
      code:
        description: 错误代码，0 表示成功
        example: 0
        type: integer
      msg:
        description: 消息
        example: success
        type: string
    type: object
  api.Data:
    properties:
      Buffer:
        type: integer
      BufferLikeString:
        type: integer
      BufferList:
        type: integer
      BufferRaw:
        type: integer
      Frame:
        type: integer
      FrameImp:
        type: integer
      MediaSource:
        type: integer
      MultiMediaSourceMuxer:
        type: integer
      RtmpPacket:
        type: integer
      RtpPacket:
        type: integer
      Socket:
        type: integer
      TcpClient:
        type: integer
      TcpServer:
        type: integer
      TcpSession:
        type: integer
      UdpServer:
        type: integer
      UdpSession:
        type: integer
    type: object
  api.DefaultOutput:
    properties:
      code:
        description: 错误代码，0 代表允许
        example: 0
        type: integer
      msg:
        description: 结果说明
        example: success
        type: string
    type: object
  api.KV:
    properties:
      key:
        type: string
      value:
        format: int64
        type: integer
    type: object
  api.OriginSock:
    properties:
      identifier:
        description: 连接标识
        example: 000001C257D35E40
        type: string
      local_ip:
        description: 本地 IP
        example: 172.26.20.112
        type: string
      local_port:
        description: 本地端口
        example: 50166
        type: integer
      peer_ip:
        description: 对端 IP
        example: 172.26.20.112
        type: string
      peer_port:
        description: 对端端口
        example: 50155
        type: integer
    type: object
  api.SwaggerAIDisableOutput:
    properties:
      enabled:
        description: 是否已关闭
        example: false
        type: boolean
      message:
        description: 返回说明
        example: AI 检测已停止
        type: string
    type: object
  api.SwaggerAIEnableOutput:
    properties:
      enabled:
        description: 是否启用成功
        example: true
        type: boolean
      message:
        description: AI 服务返回的结果信息
        example: camera started
        type: string
      source_fps:
        description: 视频源帧率
        example: 25
        type: number
      source_height:
        description: 视频源高度
        example: 1080
        type: integer
      source_width:
        description: 视频源宽度
        example: 1920
        type: integer
    type: object
  api.SwaggerChannelsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/ipc.Channel'
        type: array
      total:
        type: integer
    type: object
  api.SwaggerConfigInfoOutput:
    properties:
      sip:
        allOf:
        - $ref: '#/definitions/api.SwaggerSIPConfig'
        description: 当前系统使用的 SIP 配置
    type: object
  api.SwaggerDevicesResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/ipc.Device'
        type: array
      total:
        type: integer
    type: object
  api.SwaggerErrorResponse:
    properties:
      msg:
        description: 错误信息
        example: 参数错误
        type: string
    type: object
  api.SwaggerEventsResponse:
    properties:
      items:
        description: 事件列表
        items:
          $ref: '#/definitions/event.Event'
        type: array
      total:
        description: 总记录数
        type: integer
    type: object
  api.SwaggerGBAppendixA4Output:
    properties:
      cmd_type:
        description: 来源命令类型
        example: Alarm
        type: string
      fields:
        additionalProperties:
          type: string
        description: 结构化键值对
        type: object
      path:
        description: 在 XML 中的路径
        example: /Response/Info/AlarmInfo
        type: string
      raw_xml:
        description: 原始 XML 片段
        type: string
      type:
        description: 附录 A.4 扩展对象类型名称
        example: alarmType
        type: string
      updated_at:
        description: 最近更新时间
        example: 1710931200
        type: integer
    type: object
  api.SwaggerGBAppendixA4SnapshotOutput:
    properties:
      device_id:
        description: 当前设备国标编码
        example: 340200...
        type: string
      filter:
        description: 生效的过滤条件
        example: Alarm,DeviceStatus
        type: string
      items:
        description: 快照列表
        items:
          $ref: '#/definitions/api.SwaggerGBAppendixA4Output'
        type: array
      total:
        description: 本次返回条数
        example: 2
        type: integer
    type: object
  api.SwaggerGBDeviceControlInput:
    properties:
      action:
        description: GB 统一控制动作名
        example: ptz_cmd
        type: string
      alarm_method:
        description: 报警复位方式
        example: "2"
        type: string
      alarm_type:
        description: 报警类型
        example: "1"
        type: string
      drag_zoom:
        allOf:
        - $ref: '#/definitions/api.SwaggerGBDragZoomInput'
        description: 拉框放大/缩小参数
      home_position:
        allOf:
        - $ref: '#/definitions/api.SwaggerGBHomePositionInput'
        description: 看守位控制参数
      ptz_cmd:
        description: PTZCmd 子动作名
        example: preset_call
        type: string
      ptz_cmd_param:
        allOf:
        - $ref: '#/definitions/api.SwaggerGBPTZCmdParamInput'
        description: PTZCmd 扩展参数
      ptz_precise:
        allOf:
        - $ref: '#/definitions/api.SwaggerGBPTZPreciseInput'
        description: 精确 PTZ 参数
      sdcard_id:
        description: SD 卡编号
        example: 1
        type: integer
      stream_number:
        description: 录像/强制关键帧等场景使用的码流序号
        example: 1
        type: integer
      target_id:
        description: 目标设备或通道国标编码；为空时默认当前设备
        example: "34020000001320000001"
        type: string
      timeout:
        description: 等待设备响应超时时间，单位秒
        example: 5
        type: integer
    type: object
  api.SwaggerGBDeviceQueryInput:
    properties:
      action:
        description: GB 统一查询动作名
        example: device_status
        type: string
      config_type:
        description: 配置查询时的配置类型
        example: basic_param
        type: string
      end:
        description: 结束时间，Unix 秒
        example: 1710950400
        type: integer
      interval:
        description: 订阅或统计类查询的时间间隔
        example: 60
        type: integer
      start:
        description: 起始时间，Unix 秒
        example: 1710864000
        type: integer
      target_id:
        description: 目标设备或通道国标编码；为空时默认当前设备
        example: "34020000001320000001"
        type: string
      timeout:
        description: 等待查询应答超时时间，单位秒
        example: 5
        type: integer
    type: object
  api.SwaggerGBDeviceQueryOutput:
    properties:
      appendix_a4:
        description: 附录 A.4 扩展对象结构化结果
        items:
          $ref: '#/definitions/api.SwaggerGBAppendixA4Output'
        type: array
      cmd_type:
        description: 应答中的命令类型
        example: DeviceStatus
        type: string
      data:
        description: 协议解析后的主体数据
      device_id:
        description: 返回结果对应的设备编码
        example: 340200...
        type: string
      result:
        description: 设备处理结果
        example: OK
        type: string
      sn:
        description: 本次查询的命令序列号
        example: 12
        type: integer
      xml:
        description: 原始 XML 应答全文
        type: string
    type: object
  api.SwaggerGBDragZoomInput:
    properties:
      length:
        description: 图像总长度
        example: 1920
        type: integer
      length_x:
        description: 拉框宽度
        example: 400
        type: integer
      length_y:
        description: 拉框高度
        example: 300
        type: integer
      mid_point_x:
        description: 拉框中心点 X 坐标
        example: 960
        type: integer
      mid_point_y:
        description: 拉框中心点 Y 坐标
        example: 540
        type: integer
      width:
        description: 图像总宽度
        example: 1080
        type: integer
    type: object
  api.SwaggerGBHomePositionInput:
    properties:
      enabled:
        description: 是否启用看守位，1 启用，0 关闭
        example: 1
        type: integer
      preset_index:
        description: 看守位使用的预置位编号
        example: 1
        type: integer
      reset_time:
        description: 空闲多久后回到看守位，单位秒
        example: 60
        type: integer
    type: object
  api.SwaggerGBPTZCmdParamInput:
    properties:
      cruise_track_name:
        description: 巡航路线名称
        example: 白天巡航
        type: string
      preset_name:
        description: 预置位名称
        example: 大门
        type: string
    type: object
  api.SwaggerGBPTZPreciseInput:
    properties:
      pan:
        description: 精确水平角度
        example: 10.5
        type: number
      tilt:
        description: 精确垂直角度
        example: 5.2
        type: number
      zoom:
        description: 精确变倍值
        example: 2
        type: number
    type: object
  api.SwaggerLoginKeyOutput:
    properties:
      key:
        description: Base64 编码的 PEM 公钥，用于前端加密登录数据
        type: string
    type: object
  api.SwaggerMediaServersResponse:
    properties:
      items:
        description: 流媒体服务器列表
        items:
          $ref: '#/definitions/sms.MediaServer'
        type: array
      total:
        description: 总记录数
        type: integer
    type: object
  api.SwaggerMessageResponse:
    properties:
      msg:
        description: 处理结果说明
        example: ok
        type: string
    type: object
  api.SwaggerPTZControlInput:
    properties:
      action:
        description: PTZ 动作名，如 left/right/up/down/zoom_in/preset_call
        example: left
        type: string
      aux:
        description: 辅助开关编号
        example: 1
        type: integer
      group:
        description: 巡航组编号
        example: 1
        type: integer
      preset:
        description: 预置位编号，用于预置位相关动作
        example: 1
        type: integer
      speed:
        description: 速度值，具体范围由协议适配器决定
        example: 30
        type: integer
      timeout:
        description: 动作持续时间，单位秒；部分动作可忽略
        example: 5
        type: integer
      value:
        description: 通用附加值，用于聚焦/光圈/扫描等扩展动作
        example: 50
        type: integer
    type: object
  api.SwaggerRecordModeOutput:
    properties:
      id:
        description: 通道 ID
        type: string
      record_mode:
        description: 当前生效录像模式
        example: always
        type: string
    type: object
  api.SwaggerRecordQueryOutput:
    properties:
      daynum:
        description: 有录像的日期数量
        example: 2
        type: integer
      list:
        description: 按日期归类的录像片段
        items:
          $ref: '#/definitions/ipc.RecordDate'
        type: array
      timenum:
        description: 录像时间片段总数
        example: 6
        type: integer
    type: object
  api.SwaggerRecordingsResponse:
    properties:
      items:
        description: 录像列表
        items:
          $ref: '#/definitions/recording.Recording'
        type: array
      total:
        description: 总记录数
        type: integer
    type: object
  api.SwaggerSIPConfig:
    properties:
      domain:
        description: SIP 域
        example: "3402000000"
        type: string
      enable_tls:
        description: 是否启用 SIP-TLS
        example: false
        type: boolean
      id:
        description: 平台 20 位国标编码
        example: "34020000002000000001"
        type: string
      password:
        description: 注册鉴权密码
        example: "123456"
        type: string
      port:
        description: SIP TCP/UDP 监听端口
        example: 5060
        type: integer
      require_message_auth:
        description: 是否要求 MESSAGE/NOTIFY 做 Digest 鉴权
        example: false
        type: boolean
      strict_source_check:
        description: 是否严格校验源 IP
        example: true
        type: boolean
      tls_cert:
        description: TLS 证书路径
        example: configs/certs/sip.crt
        type: string
      tls_key:
        description: TLS 私钥路径
        example: configs/certs/sip.key
        type: string
      tls_port:
        description: SIP-TLS 监听端口
        example: 5061
        type: integer
    type: object
  api.SwaggerSnapshotLinkOutput:
    properties:
      link:
        description: 可直接访问的快照地址
        example: http://127.0.0.1:9900/channels/xxx/snapshot?token=xxx
        type: string
    type: object
  api.SwaggerTimelineResponse:
    properties:
      items:
        description: 时间轴片段列表
        items:
          $ref: '#/definitions/recording.TimeRange'
        type: array
    type: object
  api.SwaggerZonesResponse:
    properties:
      items:
        description: 当前通道配置的检测区域列表
        items:
          $ref: '#/definitions/ipc.Zone'
        type: array
    type: object
  api.Tracks:
    properties:
      channels:
        description: 音频通道数
        example: 1
        type: integer
      codec_id:
        description: 编码 ID
        example: 0
        type: integer
      codec_id_name:
        description: 编码名称
        example: CodecH264
        type: string
      codec_type:
        description: 0 视频，1 音频
        example: 0
        type: integer
      fps:
        description: 帧率
        example: 25
        type: number
      height:
        description: 视频高度
        example: 1080
        type: integer
      ready:
        description: 轨道是否就绪
        example: true
        type: boolean
      sample_bit:
        description: 采样位数
        example: 16
        type: integer
      sample_rate:
        description: 采样率
        example: 8000
        type: integer
      width:
        description: 视频宽度
        example: 1920
        type: integer
    type: object
  api.checkVersionOutput:
    properties:
      current_version:
        type: string
      description:
        type: string
      has_new_version:
        type: boolean
      new_version:
        type: string
    type: object
  api.getHealthOutput:
    properties:
      git_branch:
        type: string
      git_hash:
        type: string
      start_at:
        type: string
      version:
        type: string
    type: object
  api.getMetricsAPIOutput:
    properties:
      goroutines:
        description: 协程数量
      num_gc:
        description: gc 次数
        type: integer
      real_time_requests:
        description: 实时请求数
        type: integer
      request_top10:
        description: 请求TOP10
        items:
          $ref: '#/definitions/api.KV'
        type: array
      start_at:
        description: 运行时间
        type: string
      status_code_top10:
        description: 状态码TOP10
        items:
          $ref: '#/definitions/api.KV'
        type: array
      sys_alloc:
        description: 内存占用
        type: integer
      total_requests:
        description: 总请求数
        type: integer
      total_responses:
        description: 总响应数
        type: integer
    type: object
  api.historyControlInput:
    properties:
      action:
        description: 结构化动作，如 play/pause/seek/speed
        example: pause
        type: string
      cmd:
        description: 原始控制命令透传值
        example: PLAY
        type: string
      end_at:
        description: 结束时间，Unix 秒；start 时必填
        example: 1710950400
        type: integer
      mode:
        description: 会话模式：playback 回放，download 下载
        example: playback
        type: string
      scale:
        description: 倍速值，Action=speed 时使用
        example: 2
        type: number
      seek_at:
        description: 跳转目标时间，Action=seek 时使用
        example: 1710867600
        type: integer
      start_at:
        description: 开始时间，Unix 秒；start 时必填
        example: 1710864000
        type: integer
    type: object
  api.loginInput:
    properties:
      data:
        description: |-
          Username string `json:"username" binding:"required"`
          Password string `json:"password" binding:"required"`
        example: Base64(RSA-OAEP(username/password JSON))
        type: string
    required:
    - data
    type: object
  api.loginOutput:
    properties:
      token:
        description: 登录成功后返回的 JWT
        type: string
      user:
        description: 当前登录用户名
        type: string
    type: object
  api.onPublishInput:
    properties:
      app:
        description: 应用名
        example: live
        type: string
      id:
        description: TCP 链接唯一 ID
        example: "1"
        type: string
      ip:
        description: 推流或播放端 IP
        example: 192.168.1.10
        type: string
      mediaServerId:
        description: 流媒体服务器 ID
        example: local
        type: string
      params:
        description: URL 参数
        example: token=abc
        type: string
      port:
        description: 端口号
        example: 50000
        type: integer
      schema:
        description: 协议，rtsp/rtmp/http 等
        example: rtsp
        type: string
      stream:
        description: 流 ID
        example: camera001
        type: string
      vhost:
        description: 虚拟主机
        example: __defaultVhost__
        type: string
    type: object
  api.onPublishOutput:
    properties:
      add_mute_audio:
        type: boolean
      auto_close:
        type: boolean
      code:
        description: 错误代码，0 代表允许
        example: 0
        type: integer
      continue_push_ms:
        type: integer
      enable_audio:
        type: boolean
      enable_fmp4:
        type: boolean
      enable_hls:
        type: boolean
      enable_hls_fmp4:
        type: boolean
      enable_mp4:
        type: boolean
      enable_rtmp:
        type: boolean
      enable_rtsp:
        type: boolean
      enable_ts:
        type: boolean
      hls_save_path:
        type: string
      modify_stamp:
        type: boolean
      mp4_as_player:
        type: boolean
      mp4_max_second:
        type: integer
      mp4_save_path:
        type: string
      msg:
        description: 结果说明
        example: success
        type: string
      stream_replace:
        type: string
    type: object
  api.onRTPServerTimeoutInput:
    properties:
      local_port:
        description: RTP 本地端口
        example: 30000
        type: integer
      mediaServerId:
        description: 流媒体服务器 ID
        example: local
        type: string
      re_use_port:
        description: 是否复用端口
        example: false
        type: boolean
      ssrc:
        description: SSRC
        example: 12345678
        type: integer
      stream_id:
        description: 流 ID
        example: camera001
        type: string
      tcp_mode:
        description: TCP 模式
