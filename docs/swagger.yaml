            $ref: '#/definitions/api.SwaggerRecordingsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: 查询录像列表
      tags:
      - Recording
  /recordings/{id}:
    delete:
      parameters:
      - description: 录像ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/recording.Recording'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SwaggerErrorResponse'
      security:
